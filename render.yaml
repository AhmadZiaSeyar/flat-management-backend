databases:
  - name: flat-expense-manager-db
    plan: free
    region: oregon
    postgresMajorVersion: "18"
    databaseName: flat_expense_manager
    user: flat_manager_user

services:
  - type: web
    runtime: node
    name: flat-expense-manager-api
    plan: free
    region: oregon
    healthCheckPath: /
    buildCommand: pnpm install --frozen-lockfile && pnpm prisma:generate && pnpm build
    preDeployCommand: pnpm prisma:migrate
    startCommand: pnpm start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flat-expense-manager-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_FULL_NAME
        value: Ahmad Zia Seyar
      - key: ADMIN_USERNAME
        value: AhmadZiaSeyar
      - key: ADMIN_PHONE
        value: +10000000000
      - key: ADMIN_EMAIL
        value: ahmadziaseyar@flatwallet.app
      - key: ADMIN_PASSWORD
        sync: false
